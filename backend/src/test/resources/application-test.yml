spring:
  datasource:
    url: jdbc:h2:mem:fctnow;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH
    username: sa
    password:
    driver-class-name: org.h2.Driver
  flyway:
    init-sqls: CREATE DOMAIN IF NOT EXISTS TIMESTAMPTZ AS TIMESTAMP WITH TIME ZONE
  mail:
    host: localhost
    port: 25
    username: test
    password: test
    properties:
      mail:
        smtp:
          auth: false
          starttls:
            enable: false
            required: false

fctnow:
  security:
    jwt:
      issuer: fctnow-test
      secret: test-secret-for-fctnow-jwt-signing-with-at-least-32-bytes
      expiration: PT1H
  adzuna:
    base-url: http://localhost/adzuna-test
    country: es
    app-id: test-app-id
    app-key: test-app-key
    timeout: PT2S
  mail:
    from: noreply@fctnow.test
    from-name: FCTNow Tests
    login-url: http://localhost:4200/login
