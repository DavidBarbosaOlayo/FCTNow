spring:
  datasource:
    url: jdbc:h2:mem:fctnow-demo;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH;DB_CLOSE_DELAY=-1
    username: sa
    password:
    driver-class-name: org.h2.Driver
  flyway:
    init-sqls: CREATE DOMAIN IF NOT EXISTS TIMESTAMPTZ AS TIMESTAMP WITH TIME ZONE
    locations:
      - classpath:db/migration
      - classpath:db/seed/demo

fctnow:
  security:
    jwt:
      issuer: fctnow-demo
      secret: demo-secret-for-fctnow-jwt-signing-with-at-least-32-bytes
      expiration: PT4H
