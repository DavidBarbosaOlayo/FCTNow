server:
  port: ${FCTNOW_API_PORT:8080}

spring:
  application:
    name: fctnow-backend
  config:
    import: optional:classpath:application-secrets.yml
  profiles:
    default: local
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
  flyway:
    enabled: true
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 12MB

springdoc:
  api-docs:
    path: /api/openapi
  swagger-ui:
    path: /api/swagger-ui.html

fctnow:
  security:
    jwt:
      issuer: fctnow
      secret: ${FCTNOW_JWT_SECRET:local-development-secret-for-fctnow-jwt-signing-change-me}
      expiration: ${FCTNOW_JWT_EXPIRATION:PT1H}
  adzuna:
    base-url: ${ADZUNA_BASE_URL:https://api.adzuna.com/v1/api/jobs}
    country: ${ADZUNA_COUNTRY:es}
    app-id: ${ADZUNA_APP_ID:}
    app-key: ${ADZUNA_APP_KEY:}
    timeout: ${ADZUNA_TIMEOUT:PT8S}
