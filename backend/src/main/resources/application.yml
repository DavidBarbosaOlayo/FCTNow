server:
  port: ${FCTNOW_API_PORT:8080}

spring:
  application:
    name: fctnow-backend
  profiles:
    default: local
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
  flyway:
    enabled: true

springdoc:
  api-docs:
    path: /api/openapi
  swagger-ui:
    path: /api/swagger-ui.html

fctnow:
  security:
    jwt:
      issuer: fctnow
      secret: ${FCTNOW_JWT_SECRET:local-development-secret-for-fctnow-jwt-signing-change-me}
      expiration: ${FCTNOW_JWT_EXPIRATION:PT1H}
